<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rimas.id | Sedang Dalam Pembangunan</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Playfair Display & Lora -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Lora', serif;
            background-color: #0c0a09; 
        }
        h1, h2, h3, .font-serif-display {
            font-family: 'Playfair Display', serif;
        }
        
        /* Background Mesh */
        .bg-gradient-mesh {
            background-color: #0c0a09;
            background-image: 
                radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(12, 10, 9, 1) 0px, transparent 100%);
        }

        /* Animasi Mengambang */
        .float {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Animasi Gear */
        .spin-slow {
            animation: spin 10s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(28, 25, 23, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .text-gradient {
            background: linear-gradient(to right, #f59e0b, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .serif-italic {
            font-style: italic;
        }
    </style>
</head>
<body class="text-stone-100 min-h-screen flex flex-col bg-gradient-mesh">

    <!-- Header -->
    <header class="p-8 md:p-10 relative z-10">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold tracking-tight text-white font-serif-display">
                rimas<span class="text-amber-500">.id</span>
            </h1>
            <div class="hidden md:flex space-x-2">
                <div class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse" style="animation-delay: 0.5s"></div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center py-10 relative">
        <div class="container mx-auto px-6 text-center z-10">
            
            <!-- Dynamic Visuals -->
            <div class="relative inline-block mb-12">
                <div class="float inline-block relative">
                    <i class="fas fa-faucet-drip text-7xl md:text-8xl text-amber-500/20 absolute -top-10 -left-10 blur-sm"></i>
                    <i class="fas fa-traffic-cone text-7xl md:text-8xl text-amber-500 drop-shadow-[0_0_15px_rgba(245,158,11,0.5)]"></i>
                </div>
                <i class="fas fa-gear text-4xl text-emerald-500 spin-slow absolute -top-6 -right-6 opacity-80"></i>
                <i class="fas fa-screwdriver-wrench text-2xl text-stone-500 absolute -bottom-4 -left-8 -rotate-12"></i>
            </div>

            <!-- Content -->
            <div class="max-w-4xl mx-auto mb-12">
                <h2 class="text-4xl md:text-7xl font-bold mb-6 leading-tight tracking-tight font-serif-display">
                    Sedang Dalam <br>
                    <span class="text-gradient serif-italic font-black">Tahap Pembangunan</span>
                </h2>
                <p class="text-stone-400 max-w-xl mx-auto text-lg leading-relaxed italic">
                     Solusi hunian modern dan praktis akan segera tiba. rimas.id akan segera hadir dengan identitas  yang lebih klasik dan elegan.
                </p>
            </div>

            <!-- Countdown Timer (Glass Cards) -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 max-w-3xl mx-auto mb-16">
                <div class="glass p-6 md:p-8 rounded-3xl border-t border-white/10 shadow-2xl">
                    <span id="days" class="block text-4xl md:text-6xl font-bold text-amber-500 mb-1 font-serif-display">00</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-stone-500 font-bold">Hari</span>
                </div>
                <div class="glass p-6 md:p-8 rounded-3xl border-t border-white/10 shadow-2xl">
                    <span id="hours" class="block text-4xl md:text-6xl font-bold text-stone-100 mb-1 font-serif-display">00</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-stone-500 font-bold">Jam</span>
                </div>
                <div class="glass p-6 md:p-8 rounded-3xl border-t border-white/10 shadow-2xl">
                    <span id="minutes" class="block text-4xl md:text-6xl font-bold text-stone-100 mb-1 font-serif-display">00</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-stone-500 font-bold">Menit</span>
                </div>
                <div class="glass p-6 md:p-8 rounded-3xl border-t border-emerald-500/20 shadow-2xl">
                    <span id="seconds" class="block text-4xl md:text-6xl font-bold text-emerald-500 mb-1 font-serif-display">00</span>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-stone-500 font-bold">Detik</span>
                </div>
            </div>

            <!-- Subscription Form -->
            <div class="max-w-md mx-auto">
                <form id="notify-form" class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-amber-500 to-emerald-500 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                    <div class="relative flex flex-col sm:flex-row gap-2 bg-stone-900 p-2 rounded-2xl border border-stone-800">
                        <input 
                            type="email" 
                            placeholder="Email untuk notifikasi..." 
                            required
                            class="flex-grow px-5 py-3 rounded-xl bg-transparent focus:outline-none text-white placeholder-stone-600 font-serif"
                        >
                        <button 
                            type="submit" 
                            class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2"
                        >
                            <i class="fas fa-bell text-sm"></i> Beritahu Saya
                        </button>
                    </div>
                </form>
                <div id="form-message" class="hidden mt-6 p-4 glass rounded-2xl text-emerald-400 text-sm font-medium border border-emerald-500/30">
                    <i class="fas fa-check-circle mr-2"></i> Pendaftaran berhasil! Tunggu kabar dari kami.
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="p-10 text-center border-t border-white/5 bg-stone-950/50 backdrop-blur-md">
        <div class="flex justify-center space-x-6 mb-6">
            <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full glass hover:text-amber-500 transition-all">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full glass hover:text-emerald-500 transition-all">
                <i class="fab fa-x-twitter"></i>
            </a>
            <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full glass hover:text-amber-500 transition-all">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </div>
        <p class="text-stone-600 text-[10px] tracking-[0.3em] uppercase">
            &copy; 2026 rimas.id • Sonsong Indonesia Emas
        </p>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        // --- TARGET TANGGAL: 15 MEI 2026 ---
        const launchDate = new Date("May 15, 2026 00:00:00").getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = launchDate - now;

            if (distance < 0) {
                clearInterval(countdownInterval);
                ["days", "hours", "minutes", "seconds"].forEach(id => {
                    document.getElementById(id).innerText = "00";
                });
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        };

        const countdownInterval = setInterval(updateCountdown, 1000);
        updateCountdown();

        // Form Submission logic
        document.getElementById('notify-form').addEventListener('submit', function(e) {
            e.preventDefault();
            this.style.opacity = '0.5';
            this.style.pointerEvents = 'none';
            setTimeout(() => {
                this.style.display = 'none';
                document.getElementById('form-message').classList.remove('hidden');
            }, 500);
        });
    </script>
</body>
</html>
